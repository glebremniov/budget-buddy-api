services:
  app:
    image: ${BUDGET_BUDDY_API_IMAGE}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DOCKER_COMPOSE_ENABLED: false
      BUDGET_BUDDY_API_ACCESS_TOKEN_SECRET: ${BUDGET_BUDDY_API_ACCESS_TOKEN_SECRET}
      BUDGET_BUDDY_API_ACCESS_TOKEN_VALIDITY_SECONDS: ${BUDGET_BUDDY_API_ACCESS_TOKEN_VALIDITY_SECONDS}
      BUDGET_BUDDY_API_REFRESH_TOKEN_VALIDITY_SECONDS: ${BUDGET_BUDDY_API_REFRESH_TOKEN_VALIDITY_SECONDS}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    driver: local
