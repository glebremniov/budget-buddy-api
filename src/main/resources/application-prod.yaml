spring:
  docker:
    compose:
      enabled: false
  liquibase:
    contexts: prod
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false

security:
  jwt:
    secret: ${BUDGET_BUDDY_API_JWT_SECRET}
    validity-seconds: ${BUDGET_BUDDY_API_JWT_ACCESS_TOKEN_VALIDITY_SECONDS}
  refresh-token:
    validity-seconds: ${BUDGET_BUDDY_API_REFRESH_TOKEN_VALIDITY_SECONDS}
    cleanup:
      enabled: true
      cron: "0 0 3 * * *"

logging:
  level:
    root: INFO
