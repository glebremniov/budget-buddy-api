spring:
  application:
    name: budget-buddy-api
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: ${SERVER_PORT:8080}

security:
  cors:
    allowed-origin-patterns: [ ]
    allowed-methods: [ GET, POST, PUT, PATCH, DELETE, OPTIONS ]
    allowed-headers: [ "*" ]
    allow-credentials: true
    max-age: 3600
