spring:
  application:
    name: budget-buddy-api
  datasource:
    url: jdbc:h2:mem:budgetbuddy;DATABASE_TO_UPPER=false
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
jwt:
  secret: ${BUDGET_BUDDY_API_JWT_SECRET}
  access-token-validity-seconds: 900 # 15 minutes
  refresh-token-validity-seconds: 1209600 # 14 days

logging:
  level:
    web: DEBUG
    com.budget.buddy.budget_buddy_api: DEBUG
    org.springframework:
      jdbc: DEBUG
      springframework:security: DEBUG
