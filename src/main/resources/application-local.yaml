server:
  port: 8080

security:
  jwt:
    access-token:
      secret: access-token-secret
      validity-seconds: 86400 # 1 day
    refresh-token:
      secret: refresh-token-secret
      validity-seconds: 1209600 # 14 days

logging:
  level:
    web: DEBUG
    com.budget.buddy.budget_buddy_api: TRACE
    org.springframework:
      jdbc: DEBUG
      security: DEBUG
