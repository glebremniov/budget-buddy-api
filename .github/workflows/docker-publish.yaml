name: Docker Publish

on:
  release:
    types: [published]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/arm64, linux/amd64]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          cache-provider: basic

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(echo "${{ matrix.platform }}" | cut -d'/' -f2)
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          ./gradlew bootBuildImage -x test \
            --imagePlatform=${{ matrix.platform }} \
            --imageName=${{ env.IMAGE_NAME }}:${VERSION}-${ARCH}
          docker push ${{ env.IMAGE_NAME }}:${VERSION}-${ARCH}

  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${VERSION} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${VERSION}-arm64 \
            ${{ env.IMAGE_NAME }}:${VERSION}-amd64
