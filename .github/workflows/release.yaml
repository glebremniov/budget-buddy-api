name: Release

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: read_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          git fetch --tags
          if git tag | grep -q "^v${{ env.VERSION }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.tag_exists == 'false'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/arm64, linux/amd64]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          cache-provider: basic

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(echo "${{ matrix.platform }}" | cut -d'/' -f2)
          ./gradlew bootBuildImage -x test \
            --imagePlatform=${{ matrix.platform }} \
            --imageName=${{ env.IMAGE_NAME }}:${{ env.VERSION }}-$ARCH
          docker push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-$ARCH

  docker-manifest:
    runs-on: ubuntu-latest
    needs: [setup, docker-build]
    permissions:
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64 \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64

  release:
    runs-on: ubuntu-latest
    needs: [setup, docker-manifest]
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.VERSION }} \
            --title "v${{ env.VERSION }}" \
            --generate-notes
