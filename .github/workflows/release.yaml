name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/**'
      - '**/*.properties'
      - '**/*.yml'
      - '**/*.yaml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f

      - name: Build and test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f

      - name: Read version
        id: read_version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          git fetch --tags
          if git tag | grep -q "^v${{ env.VERSION }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Log in to GHCR
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image arm64
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew bootBuildImage -x test \
            --imagePlatform=linux/arm64 \
            --imageName=${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64

      - name: Build Docker Image amd64
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew bootBuildImage -x test \
            --imagePlatform=linux/amd64 \
            --imageName=${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64

      - name: Push Docker Images
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64
          docker push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64

      - name: Create and push manifest
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          docker manifest create ${{ env.IMAGE_NAME }}:${{ env.VERSION }} \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64 \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64
          docker manifest push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}

          docker manifest create ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64 \
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64
          docker manifest push ${{ env.IMAGE_NAME }}:latest

  release:
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.outputs.tag_exists == 'false'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.docker.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.VERSION }} \
            --title "v${{ env.VERSION }}" \
            --generate-notes
